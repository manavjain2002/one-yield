server {
    listen 0.0.0.0:__LISTEN_PORT__;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Explicit favicon handling (avoids SPA fallback confusion for /favicon.ico)
    location = /favicon.ico {
        try_files /favicon.ico /favicon.svg =404;
    }

    location = /favicon.svg {
        try_files /favicon.svg =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
